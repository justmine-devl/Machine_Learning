seed: 42
metadata_csv: data/train_metadata.csv
audio_dir: data/train_audio
output_dir: outputs/baseline
class_file: outputs/classes.txt
filename_col: filename
primary_col: primary_label
secondary_col: secondary_labels
fold: 0
n_folds: 5
use_secondary_labels: true

sample_rate: 32000
clip_duration: 5.0
n_fft: 2048
win_length: 2048
hop_length: 768
n_mels: 192
f_min: 50
f_max: 15000

model_type: baseline
backbone: tf_efficientnet_b0_ns
pretrained: true
dropout: 0.2

batch_size: 16
num_workers: 2
epochs: 10
learning_rate: 0.0005
weight_decay: 0.00001
loss: weighted_focal_bce
focal_gamma: 2.0
label_smoothing: 0.005
max_pos_weight: 20.0
device: auto
