seed: 42
metadata_csv: data/train_metadata.csv
audio_dir: data/train_audio
output_dir: outputs/ensemble
class_file: outputs/classes.txt
filename_col: filename
primary_col: primary_label
secondary_col: secondary_labels
fold: 0
n_folds: 5

sample_rate: 32000
clip_duration: 5.0
shift_seconds: 2.5
n_fft: 2048
win_length: 2048
hop_length: 768
n_mels: 192
f_min: 50
f_max: 15000

# PyTorch checkpoint ensemble. Use this if you evaluate .pt/.pth models.
checkpoints:
  - outputs/baseline/best.pt
  - outputs/sed/best.pt
model_type: sed
backbone: tf_efficientnetv2_s.in21k
pretrained: false
dropout: 0.2

# OpenVINO ensemble. If enabled, use models_dir and prefixes below.
use_openvino: false
models_dir: weights/openvino
regular_prefix: model_
shifted_prefix: model2_
model_limit: null
openvino_device: CPU

batch_size: 12
num_workers: 2
device: auto
blend_alpha: 0.5
temporal_smoothing: true
threshold: 0.5
