profile: birdclef2025_inference_compatible_noisy_student

# Repository-relative paths. Update these values for the local dataset layout.
data_root: data/birdclef-2025
train_audio_dir: data/birdclef-2025/train_audio
train_soundscapes_dir: data/birdclef-2025/train_soundscapes
train_csv: data/birdclef-2025/train.csv
taxonomy_csv: data/birdclef-2025/taxonomy.csv
sample_submission_csv: data/birdclef-2025/sample_submission.csv
output_dir: outputs/noisy_student
resume_dir: null
auto_discover_paths: false

debug: true
seed: 42
deterministic: false
auto_resume: true
reuse_pseudo: true
force_retrain: false

# Inference-compatible input and class layout.
sample_rate: 32000
train_duration_sec: 20
label_frame_sec: 5
soundscape_stride_sec: 5
model_key: model_config_6
pretrained_backbone: false
strict_class_order: false

# Stage 0 supervised teacher, followed by iterative students.
batch_size: 2
gradient_accumulation_steps: 8
num_workers: 0
epochs_teacher: 10
epochs_student: 30
num_noisy_student_iterations: 4
learning_rate: 0.0005
head_learning_rate: 0.0005
min_learning_rate: 0.000001
restart_epochs: 5
weight_decay: 0.0001
gradient_clip_norm: 1.0
mixed_precision: true
train_backbone: true
save_every_epochs: 0
save_best_training_checkpoint: false
log_every_steps: 50

n_folds: 5
fold: 0
loss_type: cross_entropy
label_smoothing: 0.0
use_pos_weight: false

# Multi-iterative teacher-student behavior.
mixup_focal_pseudo: true
pseudo_mixup_lambda: 0.5
student_drop_path_rate: 0.15
pseudo_threshold: 0.0
pseudo_power_iter1: 1.0
pseudo_power_iter2: 1.5384615385  # 1 / 0.65
pseudo_power_iter3: 1.8181818182  # 1 / 0.55
pseudo_power_iter4: 1.6666666667  # 1 / 0.6
pseudo_power: 1.6666666667
min_confidence_for_retention: 0.0

# Debug-only limits.
debug_num_train_files: 200
debug_num_soundscapes: 20
debug_epochs: 1
debug_num_noisy_student_iterations: 1
